spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Dummy AWS values — S3 calls are not made in tests
aws:
  region: us-east-1
  s3:
    bucket-name: test-bucket

ffmpeg:
  path: ffmpeg
  tmp-dir: /tmp/bytestream-test

app:
  upload:
    max-size-bytes: 10485760   # 10 MB for tests
    allowed-extensions:
      - mp4
      - mkv
      - mov
  rate-limit:
    upload:
      capacity: 100
      refill-minutes: 1
    stream:
      capacity: 1000
      refill-minutes: 1