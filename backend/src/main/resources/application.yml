spring:
  application:
    name: bytestream

  # ?? Database ??????????????????????????????????????????????
  datasource:
    url: jdbc:postgresql://localhost:5432/bytestream
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update          # auto-creates/updates tables on startup
    show-sql: true              # log SQL so you can see what's happening
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ?? File Upload Limits ????????????????????????????????????
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

# ?? Local Storage ?????????????????????????????????????????
# All HLS segments, manifests, and thumbnails are served
# from this directory via the /videos/files/** static endpoint.
storage:
  local:
    base-dir: ./bytestream-storage    # created automatically on first upload
    base-url: http://localhost:8080/videos/files

# ?? FFmpeg ????????????????????????????????????????????????
ffmpeg:
  path: ffmpeg        # just 'ffmpeg' if it's on PATH, else full path e.g. /usr/bin/ffmpeg
  tmp-dir: /tmp/bytestream/uploads

# ?? App-level settings ????????????????????????????????????
app:
  upload:
    max-size-bytes: 524288000   # 500 MB
    allowed-extensions:
      - mp4
      - mkv
      - mov
  rate-limit:
    upload:
      capacity: 5               # 5 uploads
      refill-minutes: 1         # per minute
    stream:
      capacity: 100
      refill-minutes: 1

# ?? Logging ???????????????????????????????????????????????
logging:
  level:
    com.bytestream: DEBUG
    org.springframework.web: INFO