spring:
  application:
    name: bytestream

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bytestream}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

# Cloudflare R2
r2:
  account-id: ${R2_ACCOUNT_ID}
  access-key: ${R2_ACCESS_KEY}
  secret-key: ${R2_SECRET_KEY}
  bucket: ${R2_BUCKET}
  public-url: ${R2_PUBLIC_URL}

# FFmpeg
ffmpeg:
  path: ffmpeg
  tmp-dir: /tmp/bytestream/uploads

# App settings
app:
  upload:
    max-size-bytes: 524288000
    allowed-extensions:
      - mp4
      - mkv
      - mov
  rate-limit:
    upload:
      capacity: 5
      refill-minutes: 1
    stream:
      capacity: 100
      refill-minutes: 1
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://bytestream-nine.vercel.app}

# Logging
logging:
  level:
    com.bytestream: DEBUG
    org.springframework.web: INFO
